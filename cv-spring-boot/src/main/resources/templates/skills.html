<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymelef.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${title}"></title>
</head>
<body>
  <h1>Habilidades</h1>
  <ul th:if="${!skills.isEmpty()}">
    <li th:each="skill : ${skills}" th:text="'Habilidad: ' + ${skill.skillName} + '. Nivel ' + ${skill.skillLevel}"></li>
  </ul>
</body>
</html>
